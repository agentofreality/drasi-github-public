name: Rust Lint

on:
  push:
    branches:
      - $default-branch
      - release/*
  pull_request:
    branches:
      - $default-branch
      - feature/*
      - release/*

permissions:
  contents: read

jobs:
  lint:
    uses: drasi-project/.github/.github/workflows/rust-lint.yaml@main
