name: Rust Unit Tests

on:
  push:
    branches:
      - $default-branch
      - release/*
    tags:
      - v*
  pull_request:
    branches:
      - $default-branch
      - feature/*
      - release/*

permissions:
  contents: read

jobs:
  test:
    uses: drasi-project/.github/.github/workflows/rust-unit-test.yaml@main
