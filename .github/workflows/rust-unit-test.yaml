name: Rust Unit Tests

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Rust project (relative to repo root)"
        required: false
        type: string
        default: "."
      test-command:
        description: "Command to run tests (e.g. 'make test' or 'cargo test')"
        required: false
        type: string
        default: "make test"
      submodules:
        description: "Whether to checkout submodules ('true', 'recursive', or 'false')"
        required: false
        type: string
        default: "recursive"
      install-protobuf:
        description: "Install protobuf-compiler"
        required: false
        type: boolean
        default: true
      install-jq:
        description: "Install libjq-dev and libonig-dev and set JQ_LIB_DIR"
        required: false
        type: boolean
        default: true
      additional-apt-packages:
        description: "Space-separated list of extra apt packages to install"
        required: false
        type: string
        default: ""
      rust-toolchain:
        description: "Rust toolchain to install (e.g. '1.82.0', 'stable'). Leave empty to use the repo's rust-toolchain.toml."
        required: false
        type: string
        default: ""
      runner:
        description: "GitHub Actions runner label"
        required: false
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Rust Unit Tests
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}

      - name: Install system dependencies
        run: |
          packages=""
          if [[ "${{ inputs.install-jq }}" == "true" ]]; then
            packages="libjq-dev libonig-dev"
          fi
          if [[ "${{ inputs.install-protobuf }}" == "true" ]]; then
            packages="$packages protobuf-compiler"
          fi
          if [[ -n "${{ inputs.additional-apt-packages }}" ]]; then
            packages="$packages ${{ inputs.additional-apt-packages }}"
          fi
          if [[ -n "$packages" ]]; then
            sudo apt-get update && sudo apt-get install -y $packages
          fi

      - name: Set JQ_LIB_DIR
        if: inputs.install-jq
        run: echo "JQ_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV

      - name: Install Rust toolchain
        if: inputs.rust-toolchain != ''
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Detect Rust toolchain from repo
        if: inputs.rust-toolchain == ''
        run: rustup show

      - name: Run tests
        run: ${{ inputs.test-command }}
