name: Cargo Audit

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Rust project (relative to repo root)"
        required: false
        type: string
        default: "."
      submodules:
        description: "Whether to checkout submodules ('true', 'recursive', or 'false')"
        required: false
        type: string
        default: "recursive"
      audit-args:
        description: "Additional arguments passed to cargo audit"
        required: false
        type: string
        default: ""
      deny-args:
        description: "Arguments passed to cargo deny check (leave empty to skip cargo deny)"
        required: false
        type: string
        default: ""
      runner:
        description: "GitHub Actions runner label"
        required: false
        type: string
        default: "ubuntu-latest"

permissions:
  contents: read

jobs:
  audit:
    name: Cargo Audit
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: ${{ inputs.submodules }}

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit ${{ inputs.audit-args }}

  deny:
    name: Cargo Deny
    if: inputs.deny-args != ''
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: ${{ inputs.submodules }}

      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@34899fc7ba81ca6268d5947a7a16b4649013fea1 # v2.0.11
        with:
          command: check
          arguments: ${{ inputs.deny-args }}
          manifest-path: ${{ inputs.working-directory }}/Cargo.toml
